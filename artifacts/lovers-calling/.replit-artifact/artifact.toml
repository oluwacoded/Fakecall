kind = "web"
previewPath = "/"
title = "Lovers Calling App"
version = "1.0.0"
id = "artifacts/lovers-calling"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20060

[services.development]
run = "pnpm --filter @workspace/lovers-calling run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/lovers-calling", "run", "build" ]
serve = "static"
publicDir = "artifacts/lovers-calling/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20060"
BASE_PATH = "/"
